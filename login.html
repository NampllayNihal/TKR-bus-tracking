<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | TKRES Bus Tracking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body{
      margin:0;
      font-family:"Poppins",sans-serif;
      background:linear-gradient(135deg,#0d47a1,#004d40);
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color:#fff;
    }
    .login-card{
      background:rgba(0,0,0,0.55);
      padding:24px 26px;
      border-radius:18px;
      width:95%;
      max-width:380px;
      box-shadow:0 8px 25px rgba(0,0,0,0.4);
      backdrop-filter:blur(6px);
    }
    .login-title{
      font-size:20px;
      font-weight:700;
      text-align:center;
      margin-bottom:4px;
    }
    .login-sub{
      font-size:12px;
      text-align:center;
      opacity:0.8;
      margin-bottom:18px;
    }
    .role-toggle{
      display:flex;
      background:rgba(255,255,255,0.1);
      border-radius:999px;
      padding:3px;
      margin-bottom:18px;
    }
    .role-option{
      flex:1;
      text-align:center;
      font-size:13px;
      padding:7px 0;
      border-radius:999px;
      cursor:pointer;
      user-select:none;
    }
    .role-option.active{
      background:#ffd600;
      color:#000;
      font-weight:600;
    }
    label{
      display:block;
      font-size:13px;
      margin-bottom:4px;
    }
    input{
      width:100%;
      padding:9px 10px;
      border-radius:6px;
      border:none;
      margin-bottom:12px;
      font-size:13px;
    }
    input:focus{
      outline:2px solid #ffd600;
    }
    .btn-login{
      width:100%;
      padding:10px 0;
      border-radius:999px;
      border:none;
      background:#ffd600;
      color:#000;
      font-weight:600;
      font-size:14px;
      cursor:pointer;
      margin-top:4px;
    }
    .btn-login:hover{
      background:#ffca28;
    }
    .small-text{
      font-size:11px;
      text-align:center;
      margin-top:10px;
      opacity:0.8;
    }
  </style>
</head>
<body>

  <div class="login-card">
    <div class="login-title">TKRES Bus Tracking</div>
    <div class="login-sub">Login to continue to College Bus Tracking</div>

    <!-- Role Switch -->
    <div class="role-toggle">
      <div class="role-option active" id="roleStudent">Student</div>
      <div class="role-option" id="roleDriver">Driver</div>
    </div>

    <form id="loginForm">
      <label id="idLabel" for="userId">Hall Ticket / Roll No</label>
      <input type="text" id="userId" placeholder="Enter your ID" required>

      <label for="password">Password / PIN</label>
      <input type="password" id="password" placeholder="Enter password" required>

      <button type="submit" class="btn-login">Login</button>
    </form>

    <div class="small-text">
      * This is a demo login. Any non-empty ID & password will work.
    </div>
  </div>

  <script>
    let currentRole = "student";
    const roleStudent = document.getElementById("roleStudent");
    const roleDriver = document.getElementById("roleDriver");
    const idLabel = document.getElementById("idLabel");

    roleStudent.addEventListener("click", () => {
      currentRole = "student";
      roleStudent.classList.add("active");
      roleDriver.classList.remove("active");
      idLabel.textContent = "Hall Ticket / Roll No";
    });

    roleDriver.addEventListener("click", () => {
      currentRole = "driver";
      roleDriver.classList.add("active");
      roleStudent.classList.remove("active");
      idLabel.textContent = "Driver ID / Mobile Number";
    });

    // Handle login
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const userId = document.getElementById("userId").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!userId || !password) {
        alert("Please enter both ID and password");
        return;
      }

      // Save role and user to localStorage (simple front-end login)
      localStorage.setItem("tkresRole", currentRole);
      localStorage.setItem("tkresUserId", userId);

      // Redirect based on role
      if (currentRole === "driver") {
        // Driver → go to driver live tracking page
        window.location.href = "driver-tracker.html";
      } else {
        // Student → go to main features page (index)
        window.location.href = "index.html";
      }
    });
  </script>

</body>
</html>
